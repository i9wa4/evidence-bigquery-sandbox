name: Auto-approve Workflow Runs
run-name: auto-approve ${{ github.event.workflow_run.name }} #${{ github.event.workflow_run.run_number }} by @${{ github.event.workflow_run.actor.login }}

on:
  workflow_run:
    workflows:
      - CI
      - Branch Preview
    types:
      - requested

permissions:
  actions: write

defaults:
  run:
    shell: bash

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve workflow run
        run: gh api --method POST "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/approve"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
