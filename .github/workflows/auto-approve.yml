name: Auto-approve Workflow Runs
run-name: auto-approve workflow runs

# GitHub treats the Copilot bot as an "outside collaborator" and blocks its
# workflow runs with action_required, even under the "Require approval for
# first-time contributors who are new to GitHub" setting.
#
# Fix: re-dispatch the same workflow via workflow_dispatch (which bypasses the
# gate) then cancel the original blocked run.

on:
  workflow_run:
    workflows: ["ci", "Branch Preview"]
    types: [requested]

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # workflow_dispatch runs already bypass the gate — nothing to replace.
    # Only act for allowed actors (update this list to add/remove actors).
    if: >-
      github.event.workflow_run.event != 'workflow_dispatch' &&
      contains(fromJson('["i9wa4","Copilot","copilot-swe-agent[bot]"]'),
               github.event.workflow_run.actor.login)
    steps:
      - name: Dispatch replacement and cancel blocked run
        # Pass all ${{ }} values through env vars to prevent script injection
        # (branch names or paths could otherwise embed shell metacharacters).
        run: |
          WORKFLOW_FILE=${WF_PATH##*/}
          gh workflow run "$WORKFLOW_FILE" --ref "$WF_BRANCH" -R "$REPO"
          # Wait for the new run to register before cancelling the blocked run,
          # to avoid a race where cancel arrives before the replacement is queued.
          # 5 s is empirically sufficient for GitHub to enqueue the new run.
          sleep 5
          gh api --method POST "repos/$REPO/actions/runs/$WF_RUN_ID/cancel" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_PATH: ${{ github.event.workflow_run.path }}
          WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
