name: Auto-approve Workflow Runs
run-name: auto-approve workflow runs

# Runs every 10 minutes and handles pending workflow runs from allowed actors.
#
# Strategy:
#   1. Try the approve API first (works for genuine fork-PR runs).
#   2. For push-triggered runs blocked by the "outside collaborator" gate
#      (approve API returns 403), fall back to re-triggering the same workflow
#      via workflow_dispatch on the same branch, then cancel the blocked run.
#      This works because workflow_dispatch events are not subject to the
#      outside-collaborator approval gate when triggered by a scheduled workflow
#      running from the default branch.

on:
  schedule:
    - cron: '*/10 * * * *'

permissions:
  actions: write

defaults:
  run:
    shell: bash

# Both "Copilot" (API actor.login) and "copilot-swe-agent[bot]" (git author)
# refer to the same GitHub App.  Include both to be safe.
env:
  ALLOWED_ACTORS: '["i9wa4", "Copilot", "copilot-swe-agent[bot]"]'

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve or dispatch workflow runs from allowed actors
        run: |
          ALLOWED='${{ env.ALLOWED_ACTORS }}'
          gh api "repos/${{ github.repository }}/actions/runs?status=action_required&per_page=100" \
            --jq '.workflow_runs[] | [.id, .actor.login, .head_branch, .path] | @tsv' \
          | while IFS=$'\t' read -r run_id actor branch workflow_path; do
            if echo "$ALLOWED" | jq -e --arg a "$actor" 'contains([$a])' > /dev/null 2>&1; then
              echo "Processing run $run_id (actor: $actor, branch: $branch)"
              if gh api --method POST "repos/${{ github.repository }}/actions/runs/$run_id/approve" 2>/dev/null; then
                echo "✅ Approved run $run_id"
              else
                echo "⚠️  Approve API unavailable for run $run_id — falling back to workflow_dispatch"
                workflow_file=$(basename "$workflow_path")
                if gh workflow run "$workflow_file" --ref "$branch" -R "${{ github.repository }}" 2>&1; then
                  echo "✅ Dispatched $workflow_file on $branch"
                  gh api --method POST "repos/${{ github.repository }}/actions/runs/$run_id/cancel" 2>/dev/null || true
                else
                  echo "⚠️  Could not dispatch $workflow_file on $branch (trigger not supported or branch not found)"
                fi
              fi
            else
              echo "Skipping run $run_id (actor: $actor is not in the allowed list)"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
