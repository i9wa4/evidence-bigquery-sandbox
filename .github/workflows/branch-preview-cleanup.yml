name: Branch Preview Cleanup
run-name: delete ${{ github.event.ref }} by @${{ github.actor }}

on:
  delete:

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  cleanup:
    # Only run for branch deletions, not tag deletions
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out gh-pages branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          persist-credentials: true

      - name: Remove branch preview directory
        env:
          REF_NAME: ${{ github.event.ref }}
        run: |
          SAFE_BRANCH=$(printf '%s' "$REF_NAME" | sed 's/[^a-zA-Z0-9_-]/-/g')
          if [ -d "branch/$SAFE_BRANCH" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "branch/$SAFE_BRANCH"
            git commit -m "chore: remove preview for deleted branch $REF_NAME"
            git push
          else
            echo "No preview directory found for branch/$SAFE_BRANCH — nothing to clean up."
          fi
