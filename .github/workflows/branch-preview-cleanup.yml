name: Branch Preview Cleanup
run-name: delete ${{ github.event.ref }} by @${{ github.actor }}

on:
  delete:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  cleanup:
    # Only run for branch deletions, not tag deletions
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check if gh-pages branch exists
        id: check-gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "repos/$REPO/branches/gh-pages" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "gh-pages branch does not exist — nothing to clean up."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out gh-pages branch
        if: steps.check-gh-pages.outputs.exists == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          persist-credentials: true  # required: cleanup step pushes directly to gh-pages

      - name: Remove branch preview directory
        if: steps.check-gh-pages.outputs.exists == 'true'
        env:
          REF_NAME: ${{ github.event.ref }}
        run: |
          SLUG=$(printf '%s' "$REF_NAME" | sed 's/[^a-zA-Z0-9_-]/-/g')
          HASH=$(printf '%s' "$REF_NAME" | sha256sum | cut -c1-8)
          SAFE_BRANCH="${SLUG}-${HASH}"
          if [ -d "branch/$SAFE_BRANCH" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "branch/$SAFE_BRANCH"
            git commit -m "chore: remove preview for deleted branch $REF_NAME"
            git push
          else
            echo "No preview directory found for branch/$SAFE_BRANCH — nothing to clean up."
          fi
