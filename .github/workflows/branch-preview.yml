name: Branch Preview
run-name: ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.BIGQUERY_CREDENTIALS_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set branch-specific base path
        run: |
          SAFE_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9_-]/-/g')
          echo "SAFE_BRANCH=$SAFE_BRANCH" >> "$GITHUB_ENV"
          sed -i "s|basePath:.*|basePath: /${{ github.event.repository.name }}/branch/$SAFE_BRANCH|" evidence.config.yaml

      - name: Fetch data sources (BigQuery)
        run: npm run sources
        env:
          EVIDENCE_SOURCE__BIGQUERY__PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID }}

      - name: Build static site
        run: npm run build

      - name: Deploy branch preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          destination_dir: branch/${{ env.SAFE_BRANCH }}

      - name: Output preview URL
        run: |
          {
            echo "## Branch Preview"
            echo ""
            echo "Preview URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/branch/${{ env.SAFE_BRANCH }}/"
          } >> "$GITHUB_STEP_SUMMARY"
